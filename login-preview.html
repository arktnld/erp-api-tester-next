<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERP Tester — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Space Grotesk', sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0a0a0a;
      gap: 28px;
    }

    /* Brand */
    .brand {
      display: flex;
      align-items: center;
      gap: 2px;
      z-index: 10;
    }
    .brand-code {
      font-family: 'Space Grotesk', monospace;
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.03em;
      color: #6366f1;
    }
    .brand-name {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #ededed;
    }

    /* Inner form */
    form {
      position: relative;
      width: 380px;
      background: #111111;
      padding: 48px 40px 40px;
      border-radius: 12px;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 0;
      overflow: hidden;
    }

    h2 {
      color: #6366f1;
      font-weight: 600;
      text-align: center;
      font-size: 18px;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .subtitle {
      text-align: center;
      font-size: 12px;
      color: #555;
      margin-bottom: 32px;
    }

    /* Inputs */
    .inputBox {
      position: relative;
      width: 100%;
      margin-bottom: 28px;
    }

    .inputBox input {
      position: relative;
      width: 100%;
      padding: 18px 10px 8px;
      background: transparent;
      outline: none;
      border: none;
      color: #ededed;
      font-size: 14px;
      letter-spacing: 0.03em;
      transition: 0.4s;
      z-index: 10;
    }

    .inputBox span {
      position: absolute;
      left: 0;
      top: 0;
      padding: 18px 0 8px;
      pointer-events: none;
      font-size: 14px;
      color: #555555;
      letter-spacing: 0.03em;
      transition: 0.4s;
    }

    .inputBox input:valid ~ span,
    .inputBox input:focus ~ span {
      color: #6366f1;
      transform: translateY(-22px);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
    }

    .inputBox i {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 1px;
      background: #1f1f1f;
      border-radius: 4px;
      overflow: hidden;
      transition: 0.4s;
      pointer-events: none;
      z-index: 9;
    }

    .inputBox input:valid ~ i,
    .inputBox input:focus ~ i {
      height: 40px;
      background: color-mix(in srgb, #6366f1 12%, #111111);
      border: 1px solid color-mix(in srgb, #6366f1 30%, transparent);
      border-radius: 6px;
    }

    /* Links */
    .links {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 28px;
      margin-top: -12px;
    }

    .links a {
      font-size: 12px;
      color: #555;
      text-decoration: none;
      transition: color 0.2s;
    }
    .links a:hover {
      color: #6366f1;
    }

    /* Submit */
    button[type="submit"] {
      width: 100%;
      padding: 12px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button[type="submit"]:hover {
      background: #4f46e5;
    }
    button[type="submit"]:active {
      transform: scale(0.98);
      opacity: 0.9;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #333;
      font-size: 11px;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #1f1f1f;
    }

    /* SSO button */
    .sso-btn {
      width: 100%;
      padding: 11px;
      background: transparent;
      color: #888;
      border: 1px solid #1f1f1f;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .sso-btn:hover {
      border-color: #6366f1;
      color: #ededed;
    }

    /* Footer */
    .footer {
      font-size: 11px;
      color: #333;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="brand">
    <span class="brand-code">/ERP</span>
    <span class="brand-name"> Tester</span>
  </div>

  <form autocomplete="off">
      <h2>Entrar</h2>
      <p class="subtitle">Acesso restrito à equipe autorizada</p>

      <div class="inputBox">
        <input type="email" required>
        <span>E-mail</span>
        <i></i>
      </div>

      <div class="inputBox">
        <input type="password" required>
        <span>Senha</span>
        <i></i>
      </div>

      <div class="links">
        <a href="#">Esqueceu a senha?</a>
      </div>

      <button type="submit">Continuar</button>

      <div class="divider">ou</div>

      <button type="button" class="sso-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        Entrar com SSO
      </button>
  </form>

  <p class="footer">Jarbis © 2026</p>

  <canvas id="particles" style="position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;"></canvas>

  <script>
    const canvas = document.getElementById('particles')
    const ctx = canvas.getContext('2d')
    const N = 90, MAX_DIST = 160
    let pts = []

    function resize() {
      canvas.width = window.innerWidth
      canvas.height = window.innerHeight
    }
    resize()
    window.addEventListener('resize', resize)

    function spawn() {
      const speed = 0.25 + Math.random() * 0.35
      const angle = Math.random() * Math.PI * 2
      return { x: Math.random() * canvas.width, y: Math.random() * canvas.height,
               vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
               r: 1.2 + Math.random() * 1.4 }
    }
    pts = Array.from({ length: N }, spawn)

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height)

      // Move particles
      for (let i = 0; i < pts.length; i++) {
        const p = pts[i]
        p.x += p.vx; p.y += p.vy
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1
      }

      // Build adjacency (neighbor sets for triangle detection)
      const adj = pts.map(() => [])
      const dist = []
      for (let i = 0; i < pts.length; i++) {
        dist[i] = []
        for (let j = i + 1; j < pts.length; j++) {
          const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y
          const d = Math.sqrt(dx*dx + dy*dy)
          dist[i][j] = d
          if (d < MAX_DIST) { adj[i].push(j); adj[j].push(i) }
        }
      }

      // Draw triangles first (below lines) — only small ones, sparse
      const FILL_DIST = MAX_DIST * 0.75
      for (let i = 0; i < pts.length; i++) {
        for (let ni = 0; ni < adj[i].length; ni++) {
          const j = adj[i][ni]
          if (j <= i) continue
          const dij = dist[i][j] ?? dist[j][i]
          if (dij > FILL_DIST) continue
          for (let nj = 0; nj < adj[j].length; nj++) {
            const k = adj[j][nj]
            if (k <= j) continue
            if (!adj[i].includes(k)) continue
            const dik = dist[i][k] ?? dist[k][i]
            const djk = dist[j][k] ?? dist[k][j]
            if (dik > FILL_DIST || djk > FILL_DIST) continue
            // Only fill ~25% of qualifying triangles (use index as seed)
            if ((i * 31 + j * 17 + k * 7) % 3 !== 0) continue
            const avgDist = (dij + dik + djk) / 3
            const a = (1 - avgDist / FILL_DIST) * 0.18
            ctx.beginPath()
            ctx.moveTo(pts[i].x, pts[i].y)
            ctx.lineTo(pts[j].x, pts[j].y)
            ctx.lineTo(pts[k].x, pts[k].y)
            ctx.closePath()
            ctx.fillStyle = `rgba(99,102,241,${a})`
            ctx.fill()
          }
        }
      }

      // Draw lines
      for (let i = 0; i < pts.length; i++) {
        for (let ni = 0; ni < adj[i].length; ni++) {
          const j = adj[i][ni]
          if (j <= i) continue
          const d = dist[i][j] ?? dist[j][i]
          ctx.beginPath()
          ctx.moveTo(pts[i].x, pts[i].y)
          ctx.lineTo(pts[j].x, pts[j].y)
          ctx.strokeStyle = `rgba(99,102,241,${(1 - d/MAX_DIST) * 0.35})`
          ctx.lineWidth = 0.7
          ctx.stroke()
        }
      }

      // Draw dots
      for (let i = 0; i < pts.length; i++) {
        ctx.beginPath()
        ctx.arc(pts[i].x, pts[i].y, pts[i].r, 0, Math.PI * 2)
        ctx.fillStyle = 'rgba(129,140,248,0.85)'
        ctx.fill()
      }

      requestAnimationFrame(loop)
    }
    loop()
  </script>

</body>
</html>
