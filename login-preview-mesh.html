<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERP Tester — Login (Mesh Gradient)</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Space Grotesk', sans-serif; }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #070712;
      gap: 28px;
      overflow: hidden;
    }

    /* Animated mesh gradient background */
    .mesh {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .mesh-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
    }

    .mesh-blob:nth-child(1) {
      width: 70vw; height: 70vw;
      left: -20vw; top: -20vw;
      background: radial-gradient(circle, rgba(99,102,241,0.25) 0%, transparent 70%);
      animation: blob1 20s ease-in-out infinite;
    }
    .mesh-blob:nth-child(2) {
      width: 60vw; height: 60vw;
      right: -15vw; bottom: -10vw;
      background: radial-gradient(circle, rgba(139,92,246,0.2) 0%, transparent 70%);
      animation: blob2 25s ease-in-out infinite;
    }
    .mesh-blob:nth-child(3) {
      width: 50vw; height: 50vw;
      left: 30vw; top: 20vh;
      background: radial-gradient(circle, rgba(79,70,229,0.15) 0%, transparent 70%);
      animation: blob3 18s ease-in-out infinite;
    }
    .mesh-blob:nth-child(4) {
      width: 40vw; height: 40vw;
      right: 10vw; top: -10vw;
      background: radial-gradient(circle, rgba(167,139,250,0.12) 0%, transparent 70%);
      animation: blob4 22s ease-in-out infinite;
    }

    @keyframes blob1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(8vw, 12vh) scale(1.1); }
      66%       { transform: translate(-5vw, 8vh) scale(0.9); }
    }
    @keyframes blob2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(-10vw, -8vh) scale(1.15); }
      66%       { transform: translate(6vw, -12vh) scale(0.85); }
    }
    @keyframes blob3 {
      0%, 100% { transform: translate(0, 0) scale(1) rotate(0deg); }
      50%       { transform: translate(-15vw, 10vh) scale(1.2) rotate(30deg); }
    }
    @keyframes blob4 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      40%       { transform: translate(-8vw, 15vh) scale(0.9); }
      80%       { transform: translate(5vw, 5vh) scale(1.1); }
    }

    /* Grid lines overlay */
    .grid {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* Glow dots at grid intersections — subtle */
    .grid::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(99,102,241,0.12) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 2px;
      position: relative;
      z-index: 10;
    }
    .brand-code { font-family: monospace; font-size: 26px; font-weight: 900; letter-spacing: -0.03em; color: #6366f1; }
    .brand-name { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; color: #ededed; }

    form {
      position: relative;
      z-index: 10;
      width: 380px;
      background: rgba(7, 7, 18, 0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 48px 40px 40px;
      border-radius: 12px;
      border: 1px solid rgba(99,102,241,0.18);
      display: flex;
      flex-direction: column;
      gap: 0;
      box-shadow:
        0 0 0 1px rgba(99,102,241,0.05) inset,
        0 20px 60px rgba(0,0,0,0.5);
    }

    /* Corner accent lines */
    form::before, form::after {
      content: '';
      position: absolute;
      pointer-events: none;
    }
    form::before {
      top: -1px; left: -1px;
      width: 32px; height: 32px;
      border-top: 2px solid rgba(99,102,241,0.6);
      border-left: 2px solid rgba(99,102,241,0.6);
      border-radius: 12px 0 0 0;
    }
    form::after {
      bottom: -1px; right: -1px;
      width: 32px; height: 32px;
      border-bottom: 2px solid rgba(99,102,241,0.6);
      border-right: 2px solid rgba(99,102,241,0.6);
      border-radius: 0 0 12px 0;
    }

    h2 { color: #6366f1; font-weight: 600; text-align: center; font-size: 18px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
    .subtitle { font-size: 13px; color: #555; text-align: center; margin-bottom: 32px; }

    .inputBox { position: relative; width: 100%; margin-bottom: 28px; }
    .inputBox input {
      width: 100%; background: transparent; border: none; border-bottom: 1px solid #2a2a2a;
      color: #ededed; font-size: 14px; padding: 10px 0; outline: none; transition: border-color 0.3s;
    }
    .inputBox input:focus { border-bottom-color: #6366f1; }
    .inputBox span {
      position: absolute; left: 0; top: 10px; font-size: 14px; color: #555; pointer-events: none; transition: 0.3s;
    }
    .inputBox input:focus ~ span,
    .inputBox input:valid ~ span { transform: translateY(-20px); font-size: 11px; color: #6366f1; }

    .forgot { text-align: right; margin-bottom: 28px; }
    .forgot a { font-size: 12px; color: #555; text-decoration: none; }
    .forgot a:hover { color: #6366f1; }

    .btn-primary {
      width: 100%; padding: 12px; background: #6366f1; color: white; border: none;
      border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s; margin-bottom: 24px;
    }
    .btn-primary:hover {
      background: #4f46e5;
      box-shadow: 0 0 20px rgba(99,102,241,0.4);
    }

    .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #1f1f1f; }
    .divider span { font-size: 12px; color: #444; }

    .sso-btn {
      width: 100%; padding: 11px; background: transparent; border: 1px solid #2a2a2a;
      border-radius: 8px; color: #888; font-size: 14px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; gap: 8px; transition: border-color 0.2s, color 0.2s;
    }
    .sso-btn:hover { border-color: #6366f1; color: #ededed; }

    .footer { position: relative; z-index: 10; font-size: 11px; color: #333; }

    /* Floating data fragments — hacker aesthetic */
    .fragments {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }
    .frag {
      position: absolute;
      font-family: monospace;
      font-size: 11px;
      color: rgba(99,102,241,0.15);
      white-space: nowrap;
      animation: fall linear infinite;
    }

    @keyframes fall {
      from { transform: translateY(-20px); opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: 0.8; }
      to   { transform: translateY(110vh); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="mesh">
    <div class="mesh-blob"></div>
    <div class="mesh-blob"></div>
    <div class="mesh-blob"></div>
    <div class="mesh-blob"></div>
  </div>
  <div class="grid"></div>
  <div class="fragments" id="frags"></div>

  <div class="brand">
    <span class="brand-code">/ERP</span>
    <span class="brand-name"> Tester</span>
  </div>

  <form autocomplete="off">
    <h2>Entrar</h2>
    <p class="subtitle">Acesso restrito à equipe autorizada</p>

    <div class="inputBox">
      <input type="email" required>
      <span>E-mail</span>
    </div>
    <div class="inputBox">
      <input type="password" required>
      <span>Senha</span>
    </div>

    <div class="forgot"><a href="#">Esqueceu a senha?</a></div>

    <button type="submit" class="btn-primary">Continuar</button>

    <div class="divider"><span>ou</span></div>

    <button type="button" class="sso-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      Entrar com SSO
    </button>
  </form>

  <p class="footer">Jarbis © 2026</p>

  <script>
    // Spawn drifting code fragments for ambiance
    const container = document.getElementById('frags')
    const snippets = [
      'GET /api/v2/erp/clientes',
      '200 OK',
      'Authorization: Bearer',
      'Content-Type: application/json',
      '{ "status": "active" }',
      'POST /erp/notas-fiscais',
      '401 Unauthorized',
      'X-Request-ID: a3f9',
      'curl -X GET',
      '{ "total": 1482 }',
      'Bearer eyJhbGci...',
      'DELETE /api/erp/',
      '500 Internal Server',
      'PUT /clientes/id',
      '{ "cnpj": "00.' ,
      'PATCH /erp/config',
      '304 Not Modified',
    ]

    function spawnFrag() {
      const el = document.createElement('div')
      el.className = 'frag'
      el.textContent = snippets[Math.floor(Math.random() * snippets.length)]
      el.style.left = Math.random() * 100 + 'vw'
      el.style.top = '-20px'
      const dur = 12 + Math.random() * 20
      el.style.animationDuration = dur + 's'
      el.style.animationDelay = (-Math.random() * dur) + 's'
      el.style.opacity = (0.08 + Math.random() * 0.12).toString()
      container.appendChild(el)
      setTimeout(() => el.remove(), (dur + 2) * 1000)
    }

    // Initial batch
    for (let i = 0; i < 18; i++) spawnFrag()
    setInterval(spawnFrag, 1800)
  </script>

</body>
</html>
