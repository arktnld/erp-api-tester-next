services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: erp_tester
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/erp_tester"
      PORT: "9000"
    depends_on:
      - db

volumes:
  db_data:
